services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - ics_cache:/app/ics/cache
    restart: unless-stopped

volumes:
  media_data:
  ics_cache:

# Se preferisci un Postgres locale invece di Neon per lo sviluppo, scommenta:
#
#   db:
#     image: postgres:16
#     environment:
#       POSTGRES_DB: ${DB_NAME}
#       POSTGRES_USER: ${DB_USER}
#       POSTGRES_PASSWORD: ${DB_PASSWORD}
#     volumes:
#       - db_data:/var/lib/postgresql/data
#
# e aggiungi "depends_on: [db]" al servizio web, più "db_data:" ai volumes.
